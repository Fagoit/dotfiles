add_newline = true
command_timeout = 200
format = """$directory$git_branch$git_status$cmd_duration\n$character"""

[character]
success_symbol = "[❯](bold cyan)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold cyan"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "italic purple"
format = "[$symbol$branch]($style) "

[git_status]
format = '[$all_status$ahead_behind]($style) '
style = "purple"
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
modified = "!${count} "
staged = "+${count} "
deleted = "✘${count} "

[cmd_duration]
min_time = 2000
format = "[took $duration]($style) "
style = "dimmed yellow"
